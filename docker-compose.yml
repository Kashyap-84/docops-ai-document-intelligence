services:
  api:
    build: .
    container_name: docops-ai-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  ui:
    build: .
    container_name: docops-ai-ui
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api
